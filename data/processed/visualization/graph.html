ED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Thus, even though Turing was appointed an Officer of the Order of the British Empire (OBE) in 1946 by King George VI for his wartime services, his work remained secret for many years.", "status": "FINAL", "qualifiers": {"sentence_times": ["1946"], "time_mentions": [{"text": "1946", "normalized": "1946", "type": "year", "offset_start": 94, "offset_end": 98}], "claim_qualifiers": {"9415858c2b90e5ce7f5bc5a6765b96be5137945c": {"point_in_time": "1946-06-24T00:00:00Z"}}}, "sentence_id": "sent_001669", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::AWARDED::Q10762848::6bcb303a19e1", "fusion_status": "original", "fusion_reason": "", "display_label": "AWARDED [evidence]"}, {"id": "EVIDENCE::0aae2f896d88a9efa8cf", "source": "Q7251", "target": "Q2278254", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "In 1926, at the age of 13, he went on to Sherborne School, an independent boarding school in the market town of Sherborne in Dorset, where he boarded at Westcott House.", "status": "FINAL", "qualifiers": {"sentence_times": ["1926"], "time_mentions": [{"text": "1926", "normalized": "1926", "type": "year", "offset_start": 3, "offset_end": 7}], "claim_qualifiers": {"c4ebf896d2ac001157ca4e201b9fe0fe32a8c8c9": {"end_time": "1931-01-01T00:00:00Z", "start_time": "1926-01-01T00:00:00Z"}}}, "sentence_id": "sent_001564", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q2278254::50f834bbc520", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::0dd06fba0481f8e4378a", "source": "Q7251", "target": "Q35794", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "He graduated from Cambridge in Mathematics in 1934, was a fellow at Kings College for two years, during which he wrote his famous paper which introduced the Turing Machine, went to Princeton for two years to do a Ph.D.", "status": "FINAL", "qualifiers": {}, "sentence_id": "sent_000848", "source_id": "src_first_006", "doc_id": "doc_0006", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q35794::fc6ab14de39d", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::0e72e893692799a8c910", "source": "Q7251", "target": "Q35794", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "He entered the University of Cambridge to study mathematics in 1931.", "status": "FINAL", "qualifiers": {"sentence_times": ["1931"], "time_mentions": [{"text": "1931", "normalized": "1931", "type": "year", "offset_start": 63, "offset_end": 67}]}, "sentence_id": "sent_002244", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q35794::0b2867bb1665", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::1dfd1b63cf1dbfba169c", "source": "Q7251", "target": "Q20895966", "label": "AUTHORED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Turing did the earliest work on AI, and he introduced many of the central concepts of AI in a report entitled “Intelligent Machinery” (1948).", "status": "FINAL", "qualifiers": {"sentence_times": ["1948"], "time_mentions": [{"text": "1948", "normalized": "1948", "type": "year", "offset_start": 135, "offset_end": 139}]}, "sentence_id": "sent_002241", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::AUTHORED::Q20895966::7a1ef19df94b", "fusion_status": "original", "fusion_reason": "", "display_label": "AUTHORED [evidence]"}, {"id": "EVIDENCE::1ecc5026cfee4edff48f", "source": "Q7251", "target": "Q480476", "label": "DESIGNED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "During the autumn of 1939 and the spring of 1940, Turing and others designed a related, but very different, code-breaking machine known as the Bombe.", "status": "FINAL", "qualifiers": {"sentence_times": ["1939", "1940"], "time_mentions": [{"text": "1939", "normalized": "1939", "type": "year", "offset_start": 21, "offset_end": 25}, {"text": "1940", "normalized": "1940", "type": "year", "offset_start": 44, "offset_end": 48}]}, "sentence_id": "sent_002304", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::DESIGNED::Q480476::d27ae7867a5a", "fusion_status": "original", "fusion_reason": "", "display_label": "DESIGNED [evidence]"}, {"id": "EVIDENCE::2a2808569557636768fb", "source": "Q7251", "target": "Q122744", "label": "BORN_IN", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "However, both Julius and Ethel wanted their children to be brought up in Britain, so they moved to Maida Vale, London, where Alan Turing was born on 23 June 1912, as recorded by a blue plaque on the outside of the house of his birth, later the Colonnade Hotel.", "status": "FINAL", "qualifiers": {"sentence_times": ["1912-06-23"], "time_mentions": [{"text": "23 June 1912", "normalized": "1912-06-23", "type": "date", "offset_start": 149, "offset_end": 161}]}, "sentence_id": "sent_001551", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::BORN_IN::Q122744::9b190a39414b", "fusion_status": "original", "fusion_reason": "", "display_label": "BORN_IN [evidence]"}, {"id": "EVIDENCE::3420c042474fb8ad1518", "source": "Q7251", "target": "Q21578", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "In 1936, Turing travelled to the USA and studied for three years at Princeton University.", "status": "FINAL", "qualifiers": {"sentence_times": ["1936"], "time_mentions": [{"text": "1936", "normalized": "1936", "type": "year", "offset_start": 3, "offset_end": 7}], "claim_qualifiers": {"a35bbbc5d5e76f4da758f59cbe8d3d905356d806": {"end_time": "1938-01-01T00:00:00Z", "start_time": "1937-01-01T00:00:00Z"}}}, "sentence_id": "sent_000021", "source_id": "src_first_001", "doc_id": "doc_0001", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q21578::0ac8fd6c642c", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::3caf50eddc46c8d4eab8", "source": "Q7251", "target": "Q2011497", "label": "DIED_IN", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "He continued to work and his friends supported him, but two years later he was found dead at home in Wilmslow, an apparent suicide by a cyanide laced apple, though many questions remain.", "status": "FINAL", "qualifiers": {}, "sentence_id": "sent_001984", "source_id": "src_second_002", "doc_id": "doc_0010", "semantic_key": "EVIDENCE::Q7251::DIED_IN::Q2011497::7642088edec6", "fusion_status": "original", "fusion_reason": "", "display_label": "DIED_IN [evidence]"}, {"id": "EVIDENCE::3d12b4def6956e258269", "source": "Q7251", "target": "Q220798", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 0.752705, "evidence_text": "From September 1938, Turing worked part-time with the Government Code and Cypher School (GC&CS), the British codebreaking organisation.", "status": "FINAL", "qualifiers": {"sentence_times": ["1938-09"], "time_mentions": [{"text": "September 1938", "normalized": "1938-09", "type": "month_year", "offset_start": 5, "offset_end": 19}], "claim_qualifiers": {"a8c57427aad462c9fde10ee437d2f283bc83e71a": {"end_time": "1945-01-01T00:00:00Z", "start_time": "1938-01-01T00:00:00Z"}}}, "sentence_id": "sent_001629", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q220798::89449177085d", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::46cdfd31a971fb503507", "source": "Q7251", "target": "Q2278254", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 0.859519, "evidence_text": "Cambridge Turing moved from Hazelhurst to Sherborne School in Dorset, whence he came up to King’s College Cambridge in October 1931.", "status": "FINAL", "qualifiers": {"claim_qualifiers": {"c4ebf896d2ac001157ca4e201b9fe0fe32a8c8c9": {"end_time": "1931-01-01T00:00:00Z", "start_time": "1926-01-01T00:00:00Z"}}}, "sentence_id": "sent_000396", "source_id": "src_first_003", "doc_id": "doc_0003", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q2278254::010c4891c6b6", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::47826e7d1afc34c7f69a", "source": "Q7251", "target": "Q480476", "label": "DESIGNED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Building on work started by Polish codebreakers before their country was invaded, Turing and his colleague Gordon Welchman developed a machine to help the codebreakers: the Bombe.", "status": "FINAL", "qualifiers": {}, "sentence_id": "sent_001913", "source_id": "src_second_002", "doc_id": "doc_0010", "semantic_key": "EVIDENCE::Q7251::DESIGNED::Q480476::7f525887c81a", "fusion_status": "original", "fusion_reason": "", "display_label": "DESIGNED [evidence]"}, {"id": "EVIDENCE::61d5a45ddc26bfea2c40", "source": "Q7251", "target": "Q924289", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 0.964452, "evidence_text": "A pioneer in computational science When Turing came to the Princeton Graduate School in 1936 after studies at King's College, Cambridge, he had already written the seminal paper, \"On Computable Numbers.\"", "status": "FINAL", "qualifiers": {"claim_qualifiers": {"391ec4a34329e02cdfc1895e03de66da55071309": {"end_time": "1934-01-01T00:00:00Z", "start_time": "1931-01-01T00:00:00Z"}}}, "sentence_id": "sent_000535", "source_id": "src_first_004", "doc_id": "doc_0004", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q924289::a98ffcec8b58", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::631bb44fa31d7ad1d530", "source": "Q7251", "target": "Q220798", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Secretly, he worked part-time for the British cryptanalytic department, the so-called Government Code and Cypher School.", "status": "FINAL", "qualifiers": {"claim_qualifiers": {"a8c57427aad462c9fde10ee437d2f283bc83e71a": {"end_time": "1945-01-01T00:00:00Z", "start_time": "1938-01-01T00:00:00Z"}}}, "sentence_id": "sent_000725", "source_id": "src_first_005", "doc_id": "doc_0005", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q220798::921d335a7c5e", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::63361e1f1f046e9dc1b1", "source": "Q7251", "target": "Q15631401", "label": "AWARDED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Turing was elected a fellow of the Royal Society of London in March 1951, a high honour, yet his life was about to become very hard.", "status": "FINAL", "qualifiers": {"sentence_times": ["1951-03"], "time_mentions": [{"text": "March 1951", "normalized": "1951-03", "type": "month_year", "offset_start": 62, "offset_end": 72}], "claim_qualifiers": {"4ef9ebdc94c7236c1e558dfb47f8d63c027e38d9": {"point_in_time": "1951-01-01T00:00:00Z"}}}, "sentence_id": "sent_002366", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::AWARDED::Q15631401::6823cda08f9e", "fusion_status": "original", "fusion_reason": "", "display_label": "AWARDED [evidence]"}, {"id": "EVIDENCE::6f5e863d694ba752b6b9", "source": "Q7251", "target": "Q867530", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "In 1948, Turing joined Max Newman's Computing Machine Laboratory at the University of Manchester, where he contributed to the development of early Manchester computers and became interested in mathematical biology.", "status": "FINAL", "qualifiers": {"sentence_times": ["1948"], "time_mentions": [{"text": "1948", "normalized": "1948", "type": "year", "offset_start": 3, "offset_end": 7}], "claim_qualifiers": {"09c11d7c3f9769a0c4188c79bb809727aaca82d7": {"end_time": "1952-01-01T00:00:00Z", "start_time": "1948-03-01T00:00:00Z"}}}, "sentence_id": "sent_001527", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q867530::56a1b4481301", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::ab6a2e12bb0827435258", "source": "Q7251", "target": "Q220798", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 0.785577, "evidence_text": "At the outbreak of war in September 1939 he was drafted to the Government Code and Cypher School at Bletchley Park as a cryptanalyst.", "status": "FINAL", "qualifiers": {"sentence_times": ["1939-09"], "time_mentions": [{"text": "September 1939", "normalized": "1939-09", "type": "month_year", "offset_start": 26, "offset_end": 40}], "claim_qualifiers": {"a8c57427aad462c9fde10ee437d2f283bc83e71a": {"end_time": "1945-01-01T00:00:00Z", "start_time": "1938-01-01T00:00:00Z"}}}, "sentence_id": "sent_000850", "source_id": "src_first_006", "doc_id": "doc_0006", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q220798::f33d311820c7", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::ae252baf1d87b1633a4d", "source": "Q2278254", "target": "Q586895", "label": "LOCATED_IN", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "In 1926, at the age of 13, he went on to Sherborne School, an independent boarding school in the market town of Sherborne in Dorset, where he boarded at Westcott House.", "status": "FINAL", "qualifiers": {}, "sentence_id": "sent_001564", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q2278254::LOCATED_IN::Q586895::50f834bbc520", "fusion_status": "original", "fusion_reason": "", "display_label": "LOCATED_IN [evidence]"}, {"id": "EVIDENCE::aee25743e2abf2a7a0dd", "source": "Q924289", "target": "Q350", "label": "LOCATED_IN", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Alan Turing reading on the porch of a house (Archives Centre, King's College, Cambridge, AMT/K/7/36)", "status": "FINAL", "qualifiers": {}, "sentence_id": "sent_000098", "source_id": "src_first_001", "doc_id": "doc_0001", "semantic_key": "EVIDENCE::Q924289::LOCATED_IN::Q350::93737999c589", "fusion_status": "original", "fusion_reason": "", "display_label": "LOCATED_IN [evidence]"}, {"id": "EVIDENCE::c1193132557d300023f1", "source": "Q7251", "target": "Q20895966", "label": "AUTHORED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "In late 1947 he returned to Cambridge for a sabbatical year during which he produced a seminal work on Intelligent Machinery that was not published in his lifetime.", "status": "FINAL", "qualifiers": {"sentence_times": ["1947"], "time_mentions": [{"text": "1947", "normalized": "1947", "type": "year", "offset_start": 8, "offset_end": 12}]}, "sentence_id": "sent_001736", "source_id": "src_second_001", "doc_id": "doc_0009", "semantic_key": "EVIDENCE::Q7251::AUTHORED::Q20895966::0df90476a068", "fusion_status": "original", "fusion_reason": "", "display_label": "AUTHORED [evidence]"}, {"id": "EVIDENCE::c37a6b3e6efad4a7c168", "source": "Q7251", "target": "Q189223", "label": "PROPOSED", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "Turing proposed what subsequently became known as the Turing test as a criterion for whether an artificial computer is thinking (1950).", "status": "FINAL", "qualifiers": {"sentence_times": ["1950"], "time_mentions": [{"text": "1950", "normalized": "1950", "type": "year", "offset_start": 129, "offset_end": 133}]}, "sentence_id": "sent_002340", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::PROPOSED::Q189223::ed075aacb70b", "fusion_status": "original", "fusion_reason": "", "display_label": "PROPOSED [evidence]"}, {"id": "EVIDENCE::ca793adfe3c3a13a78cb", "source": "Q7251", "target": "Q21578", "label": "STUDIED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "He graduated from Cambridge in Mathematics in 1934, was a fellow at Kings College for two years, during which he wrote his famous paper which introduced the Turing Machine, went to Princeton for two years to do a Ph.D.", "status": "FINAL", "qualifiers": {"claim_qualifiers": {"a35bbbc5d5e76f4da758f59cbe8d3d905356d806": {"end_time": "1938-01-01T00:00:00Z", "start_time": "1937-01-01T00:00:00Z"}}}, "sentence_id": "sent_000848", "source_id": "src_first_006", "doc_id": "doc_0006", "semantic_key": "EVIDENCE::Q7251::STUDIED_AT::Q21578::fc6ab14de39d", "fusion_status": "original", "fusion_reason": "", "display_label": "STUDIED_AT [evidence]"}, {"id": "EVIDENCE::d3a2d64f1f8a2ecea244", "source": "Q7251", "target": "Q1967606", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 1.0, "evidence_text": "After the War and Artificial Intelligence After the war Turing worked at the National Physical Laboratory (NPL) in Teddington, and took up long-distance running (ending his earlier dislike of outdoor pursuits).", "status": "FINAL", "qualifiers": {"claim_qualifiers": {"1e59abaebef6354946c2a0039aebcfbba20eed58": {"end_time": "1947-01-01T00:00:00Z", "start_time": "1945-01-01T00:00:00Z"}}}, "sentence_id": "sent_000424", "source_id": "src_first_003", "doc_id": "doc_0003", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q1967606::e80f5294c04a", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::d60779d8eae739fd594b", "source": "Q7251", "target": "Q1967606", "label": "WORKED_AT", "type": "Directed", "source_layer": "evidence", "source_name": "pattern+ds+llm_verify", "confidence": 0.758368, "evidence_text": "In 1945, the war over, Turing was recruited to the National Physical Laboratory (NPL) in London to create an electronic computer.", "status": "FINAL", "qualifiers": {"sentence_times": ["1945"], "time_mentions": [{"text": "1945", "normalized": "1945", "type": "year", "offset_start": 3, "offset_end": 7}], "claim_qualifiers": {"1e59abaebef6354946c2a0039aebcfbba20eed58": {"end_time": "1947-01-01T00:00:00Z", "start_time": "1945-01-01T00:00:00Z"}}}, "sentence_id": "sent_002329", "source_id": "src_second_003", "doc_id": "doc_0011", "semantic_key": "EVIDENCE::Q7251::WORKED_AT::Q1967606::79ff980832a4", "fusion_status": "original", "fusion_reason": "", "display_label": "WORKED_AT [evidence]"}, {"id": "EVIDENCE::dd00a15ce7367c358cac", "source": " const nodes = graph.nodes.map((node, index) => ({...node, x: 80 + (index % 24) * 32, y: 80 + Math.floor(index / 24) * 32, vx: 0, vy: 0}));
const nodeById = new Map(nodes.map(node => [node.id, node]));
const edges = graph.edges.map(edge => ({...edge, sourceNode: nodeById.get(edge.source), targetNode: nodeById.get(edge.target)})).filter(edge => edge.sourceNode && edge.targetNode);
document.getElementById("summary").textContent = `${graph.stats.node_count} 个节点 / ${graph.stats.edge_count} 条边，当前预览 ${nodes.length} 个高连接节点`;
function resize() {
  canvas.width = box.clientWidth * devicePixelRatio;
  canvas.height = box.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
function tick() {
  const width = box.clientWidth;
  const height = box.clientHeight;
  for (const node of nodes) {
    node.vx += (width / 2 - node.x) * 0.0008;
    node.vy += (height / 2 - node.y) * 0.0008;
  }
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const distance2 = Math.max(dx * dx + dy * dy, 25);
      const force = 900 / distance2;
      a.vx += dx * force * 0.01; a.vy += dy * force * 0.01;
      b.vx -= dx * force * 0.01; b.vy -= dy * force * 0.01;
    }
  }
  for (const edge of edges) {
    const dx = edge.targetNode.x - edge.sourceNode.x;
    const dy = edge.targetNode.y - edge.sourceNode.y;
    const distance = Math.max(Math.hypot(dx, dy), 1);
    const force = (distance - 130) * 0.002;
    edge.sourceNode.vx += dx / distance * force;
    edge.sourceNode.vy += dy / distance * force;
    edge.targetNode.vx -= dx / distance * force;
    edge.targetNode.vy -= dy / distance * force;
  }
  for (const node of nodes) {
    node.vx *= 0.84; node.vy *= 0.84;
    node.x = Math.max(18, Math.min(width - 18, node.x + node.vx));
    node.y = Math.max(18, Math.min(height - 18, node.y + node.vy));
  }
}
function draw() {
  ctx.clearRect(0, 0, box.clientWidth, box.clientHeight);
  ctx.lineWidth = 1;
  ctx.font = "12px Arial";
  for (const edge of edges) {
    ctx.strokeStyle = edge.source_layer === "facts" ? "rgba(20,20,20,.25)" : edge.source_layer === "evidence" ? "rgba(209,73,91,.28)" : edge.source_layer === "wikipedia_direct" ? "rgba(58,134,255,.35)" : "rgba(42,157,143,.25)";
    ctx.beginPath(); ctx.moveTo(edge.sourceNode.x, edge.sourceNode.y); ctx.lineTo(edge.targetNode.x, edge.targetNode.y); ctx.stroke();
  }
  for (const node of nodes) {
    const radius = Math.min(22, 5 + Math.sqrt(Number(node.degree || 0)) * 2.5);
    ctx.fillStyle = colors[node.type] || colors.Event;
    ctx.beginPath(); ctx.arc(node.x, node.y, radius, 0, Math.PI * 2); ctx.fill();
    if (Number(node.degree || 0) >= 3) {
      ctx.fillStyle = "#202124";
      ctx.fillText(String(node.label).slice(0, 24), node.x + radius + 4, node.y + 4);
    }
  }
}
function frame() { tick(); draw(); requestAnimationFrame(frame); }
function showItem(item) {
  details.innerHTML = Object.entries(item).filter(([key, value]) => !["vx","vy","x","y"].includes(key) && value !== "").map(([key, value]) => `<div class="row"><strong>${key}</strong><br>${String(value).replace(/[&<>]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[s]))}</div>`).join("");
}
canvas.addEventListener("click", event => {
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left, y = event.clientY - rect.top;
  let best = null, bestDistance = 16;
  for (const node of nodes) {
    const distance = Math.hypot(node.x - x, node.y - y);
    if (distance < bestDistance) { best = node; bestDistance = distance; }
  }
  if (best) showItem(best);
});
resize();
window.addEventListener("resize", resize);
frame();
</script>
</body>
</html>
